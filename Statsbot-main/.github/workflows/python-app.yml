name: Python application

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install flake8

      - name: Lint with flake8
        run: |
          # fail on syntax errors or undefined names
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics

      - name: Smoke test
        run: |
          python -c "
          from database.models import set_db_path, init_db
          set_db_path('/tmp/ci_test.db')
          init_db()
          from bot.parser import parse_message
          from bot.auth import hash_password, verify_password
          assert verify_password('test', hash_password('test'))
          print('OK')
          "
